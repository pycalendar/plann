repos:
 - repo: https://github.com/astral-sh/ruff-pre-commit
   rev: v0.15.6
   hooks:
    # Run the linter with auto-fix on commit
    - id: ruff
      args:
       - "--fix"
      stages: [pre-commit]
    # Run the formatter on commit
    - id: ruff-format
      stages: [pre-commit]

 - repo: https://github.com/pre-commit/pre-commit-hooks
   rev: v6.0.0
   hooks:
    - id: trailing-whitespace
      stages: [pre-commit]
    - id: end-of-file-fixer
      stages: [pre-commit]
    - id: check-yaml
      stages: [pre-commit]
    - id: check-toml
      stages: [pre-commit]
    - id: check-ast
      stages: [pre-commit]
    - id: mixed-line-ending
      args: [--fix=lf]
      stages: [pre-commit]

 - repo: local
   hooks:
    # Run ruff check without fixes on push (to catch any issues)
    - id: ruff-check-push
      name: Ruff check (no fixes)
      entry: ruff check
      language: system
      types: [python]
      pass_filenames: false
      stages: [pre-push]
    # Run full test suite on push
    - id: pytest-push
      name: Run pytest
      entry: python -m pytest
      language: system
      pass_filenames: false
      always_run: true
      stages: [pre-push]
    # Prevent direct pushes to master on a v1.0+ project
    - id: no-push-to-main
      name: Prevent direct push to master
      entry: bash -c 'branch=$(git rev-parse --abbrev-ref HEAD); if [ "$branch" = "master" ]; then echo "Direct pushes to master are not allowed. Use a branch and PR."; exit 1; fi'
      language: system
      pass_filenames: false
      stages: [pre-push]

 - repo: https://github.com/compilerla/conventional-pre-commit
   rev: v3.4.0
   hooks:
    - id: conventional-pre-commit
      stages: [commit-msg]

 - repo: https://github.com/lycheeverse/lychee
   rev: lychee-v0.23.0
   hooks:
    - id: lychee-docker
      args: ["--no-progress", "--timeout", "10", "--config", ".lychee.toml"]
      types: [markdown, rst]
